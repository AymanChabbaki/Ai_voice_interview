name: Phase 6 - CI/CD to K3s

on:
  push:
    branches:
      - devOps
    paths:
      - backend/**
      - frontend/**
      - infra/k8s/**
      - .github/workflows/phase6-cicd-k3s.yml
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/svi-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/svi-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/svi-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/svi-frontend:${{ github.sha }}

  deploy-to-k3s:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K3S_SSH_PRIVATE_KEY }}

      - name: Deploy images to cluster
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_SSH_USER: ${{ secrets.K3S_SSH_USER }}
          K3S_SSH_PORT: ${{ secrets.K3S_SSH_PORT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          if [ -z "${K3S_HOST}" ] || [ -z "${K3S_SSH_USER}" ]; then
            echo "K3S_HOST and K3S_SSH_USER must be configured in GitHub Secrets."
            exit 1
          fi

          PORT="${K3S_SSH_PORT:-22}"
          REMOTE="${K3S_SSH_USER}@${K3S_HOST}"

          ssh -p "${PORT}" -o StrictHostKeyChecking=accept-new "${REMOTE}" \
            "DOCKERHUB_USERNAME='${DOCKERHUB_USERNAME}' RELEASE_SHA='${{ github.sha }}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          NS="smart-interviewer"

          rollout_or_recreate() {
            DEPLOYMENT="$1"
            APP_LABEL="$2"
            TIMEOUT="$3"

            if kubectl -n "${NS}" rollout status "deployment/${DEPLOYMENT}" --timeout="${TIMEOUT}"; then
              return 0
            fi

            echo "Rollout for ${DEPLOYMENT} timed out. Collecting diagnostics before fallback..."
            kubectl -n "${NS}" get pods -l "app=${APP_LABEL}" -o wide || true
            kubectl -n "${NS}" describe deployment "${DEPLOYMENT}" || true

            echo "Applying fallback recreate strategy for ${DEPLOYMENT}..."
            kubectl -n "${NS}" scale "deployment/${DEPLOYMENT}" --replicas=0
            kubectl -n "${NS}" wait --for=delete pod -l "app=${APP_LABEL}" --timeout=180s || true
            kubectl -n "${NS}" scale "deployment/${DEPLOYMENT}" --replicas=1
            kubectl -n "${NS}" rollout status "deployment/${DEPLOYMENT}" --timeout=300s
          }

          # Keep backend rollout safe for low-capacity clusters.
          kubectl -n "${NS}" patch deployment backend --type merge \
            -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":"0","maxUnavailable":"1"}}}}' || true

          kubectl -n "${NS}" set image deployment/backend backend="${DOCKERHUB_USERNAME}/svi-backend:${RELEASE_SHA}"
          kubectl -n "${NS}" set image deployment/frontend frontend="${DOCKERHUB_USERNAME}/svi-frontend:${RELEASE_SHA}"

          rollout_or_recreate backend backend 240s
          rollout_or_recreate frontend frontend 240s

          kubectl -n "${NS}" get deploy backend frontend -o wide
          kubectl -n "${NS}" get pods -o wide
          REMOTE_SCRIPT
