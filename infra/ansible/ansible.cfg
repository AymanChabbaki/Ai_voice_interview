[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
forks = 10

timeout = 30

[ssh_connection]
pipelining = True
retries = 2
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=15 -o ConnectionAttempts=2 -o PreferredAuthentications=publickey -o IdentitiesOnly=yes -o GSSAPIAuthentication=no

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
